<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Italy Upsell Leaderboard</title>
    <!-- Essential Libraries with Fallback Logic -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .bar-transition { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hidden-emergency { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-900">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-white rounded-3xl shadow-xl shadow-blue-900/5 border border-slate-200 p-8 mb-8 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="relative z-10 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                    <span id="status-badge" class="px-4 py-1 bg-amber-100 text-amber-700 text-[10px] font-black rounded-full uppercase tracking-[0.2em]">Connecting...</span>
                    <span id="update-time" class="text-slate-400 text-xs font-medium italic underline decoration-blue-200 decoration-2 underline-offset-4">Handshaking with Google...</span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight leading-none uppercase">AM Italy Upsell<br><span class="text-blue-600 italic normal-case">Leaderboard</span></h1>
            </div>
            <div id="stats" class="relative z-10"></div>
        </header>

        <div id="main-content">
            <div id="loader" class="flex flex-col items-center justify-center py-24 text-slate-300 bg-white rounded-3xl border border-slate-100 shadow-sm transition-all duration-500">
                <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-4 border-blue-100 border-b-blue-600 mb-4"></div>
                <p id="loading-text" class="font-bold uppercase tracking-widest text-xs text-slate-400">Requesting Spreadsheet Data...</p>
                
                <!-- Emergency Help UI (Hidden by default) -->
                <div id="emergency-ui" class="hidden-emergency mt-8 p-6 bg-amber-50 rounded-2xl border border-amber-100 max-w-sm text-center">
                    <p class="text-amber-800 text-xs font-bold mb-4 uppercase tracking-tight">⚠️ Connection taking too long</p>
                    <p class="text-amber-700 text-[10px] leading-relaxed mb-4">Your office network (Teads VPN) might be blocking this page's ability to talk to Google. Try the button below:</p>
                    <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR6XFMPsUzIfkiclyMTRuN-SV2ioJEQY2p-dP1FIDsoDe8JA_DHQmOabtJHMr8V_U0BQjs7O3v9uBK5/pub?gid=0&single=true&output=csv" 
                       target="_blank" 
                       class="inline-block bg-amber-600 text-white text-[10px] font-black px-6 py-3 rounded-xl uppercase tracking-widest shadow-lg shadow-amber-600/20">
                       Open Raw Scores
                    </a>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center border-t border-slate-200 pt-8">
            <div class="inline-flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <span>Refreshes every 5 mins</span>
                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                <button onclick="updateLeaderboard()" class="hover:text-blue-600 transition-colors underline underline-offset-4">Manual Refresh</button>
            </div>
        </footer>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6XFMPsUzIfkiclyMTRuN-SV2ioJEQY2p-dP1FIDsoDe8JA_DHQmOabtJHMr8V_U0BQjs7O3v9uBK5/pub?gid=0&single=true&output=csv";

        // Emergency timeout - shows help if nothing happens within 5 seconds
        const emergencyTimer = setTimeout(() => {
            const emergency = document.getElementById('emergency-ui');
            if (emergency) emergency.style.display = 'block';
            console.warn("Connection is hanging. Showing emergency UI.");
        }, 5000);

        async function updateLeaderboard() {
            const container = document.getElementById('main-content');
            const timeLabel = document.getElementById('update-time');
            const badge = document.getElementById('status-badge');
            
            try {
                // Check if PapaParse loaded. If not, we use a basic fallback parser
                const usePapa = typeof Papa !== 'undefined';
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 12000); // 12s hard cut-off

                const response = await fetch(`${CSV_URL}&t=${Date.now()}`, { 
                    signal: controller.signal 
                });
                
                clearTimeout(timeoutId);
                clearTimeout(emergencyTimer);

                if (!response.ok) throw new Error(`Google Error: ${response.status}`);
                
                const csvText = await response.text();

                const processData = (parsedRows) => {
                    const data = parsedRows.map(row => ({
                        name: (row[4] || "").toString().trim(),
                        score: parseInt((row[5] || "").toString().trim().replace(/,/g, ''))
                    }))
                    .filter(item => item.name && item.name !== "" && !isNaN(item.score) && item.name.toLowerCase() !== "name")
                    .sort((a, b) => b.score - a.score);

                    if (data.length === 0) {
                        badge.innerText = "No Scores Found";
                        badge.className = "px-4 py-1 bg-slate-100 text-slate-600 text-[10px] font-black rounded-full uppercase tracking-[0.2em]";
                        container.innerHTML = `<div class="p-20 text-center bg-white rounded-3xl border border-slate-200 text-slate-400 font-bold uppercase tracking-widest text-xs">Connected but Recap Columns E/F are empty.</div>`;
                        return;
                    }

                    render(data);
                    badge.innerText = "Live Sync";
                    badge.className = "px-4 py-1 bg-green-100 text-green-700 text-[10px] font-black rounded-full uppercase tracking-[0.2em]";
                    timeLabel.innerText = `Last update: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                };

                if (usePapa) {
                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: (results) => processData(results.data)
                    });
                } else {
                    // Primitive fallback parser if CDN failed
                    const simpleRows = csvText.split('\n').map(r => r.split(','));
                    processData(simpleRows);
                }

            } catch (err) {
                clearTimeout(emergencyTimer);
                badge.innerText = "Connection Blocked";
                badge.className = "px-4 py-1 bg-red-100 text-red-700 text-[10px] font-black rounded-full uppercase tracking-[0.2em]";
                
                container.innerHTML = `
                <div class="p-12 text-center bg-red-50 text-red-600 rounded-3xl border border-red-100 shadow-sm">
                    <p class="font-black text-xl mb-2 italic uppercase tracking-tight">Sync Refused</p>
                    <p class="text-xs opacity-80 uppercase tracking-widest font-bold mb-8 leading-loose">Teads Security or VPN is blocking the link to Google Sheets.</p>
                    
                    <div class="flex flex-col gap-4 max-w-xs mx-auto">
                        <a href="${CSV_URL}" target="_blank" class="bg-blue-600 text-white text-[10px] font-black py-4 rounded-2xl uppercase tracking-widest shadow-xl shadow-blue-600/30">
                            Check Spreadsheet Directly
                        </a>
                        <button onclick="location.reload()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600">
                            Try Again
                        </button>
                        <p class="text-[9px] text-slate-400 normal-case leading-relaxed mt-4 italic">
                            Tip: Open this link on your personal phone (not on office Wi-Fi) to see the live board.
                        </p>
                    </div>
                </div>`;
            }
        }

        function render(data) {
            const container = document.getElementById('main-content');
            const statsContainer = document.getElementById('stats');
            const maxScore = Math.max(...data.map(d => d.score), 1);
            
            statsContainer.innerHTML = `
                <div class="bg-slate-900 text-white px-8 py-4 rounded-3xl shadow-2xl shadow-blue-900/20 flex flex-col items-center md:items-end">
                    <span class="text-[9px] font-black uppercase opacity-50 block mb-1 tracking-widest">Competition High</span>
                    <span class="text-4xl font-black italic tracking-tighter">${maxScore} <span class="text-xs font-bold not-italic opacity-40">PTS</span></span>
                </div>`;

            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    ${data.slice(0, 3).map((p, i) => `
                        <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-xl relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <span class="text-5xl font-black italic text-slate-100 group-hover:text-blue-50 transition-colors">0${i+1}</span>
                                <div class="w-12 h-12 flex items-center justify-center rounded-2xl ${i === 0 ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'bg-slate-50 border border-slate-100 text-2xl'}">
                                    ${i === 0 ? '👑' : i === 1 ? '🥈' : '🥉'}
                                </div>
                            </div>
                            <h3 class="font-black text-xl uppercase tracking-tight text-slate-800 leading-tight mb-2">${p.name}</h3>
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black text-blue-600">${p.score}</span>
                                <span class="text-[9px] font-black uppercase text-slate-300 tracking-widest">Points Total</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="bg-white rounded-[2rem] shadow-xl shadow-blue-900/5 border border-slate-200 p-8 space-y-8">
                    <div class="flex items-center justify-between pb-2 border-b border-slate-50">
                         <h2 class="font-black text-slate-400 uppercase tracking-[0.2em] text-[10px]">Current Standings</h2>
                         <span class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">${data.length} AMs Active</span>
                    </div>
                    ${data.map((p, i) => `
                        <div class="flex items-center gap-6 group">
                            <div class="w-10 text-center font-black text-slate-200 italic text-2xl group-hover:text-blue-600 transition-colors">#${i + 1}</div>
                            <div class="flex-1">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="font-extrabold text-slate-800 tracking-tight group-hover:translate-x-1 transition-transform uppercase text-sm">${p.name}</span>
                                    <span class="text-xs font-black text-slate-900">${p.score} <span class="opacity-20 text-[8px]">PTS</span></span>
                                </div>
                                <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden relative">
                                    <div class="h-full rounded-full bar-transition relative ${i < 3 ? 'bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.3)]' : 'bg-slate-300'}" 
                                         style="width: ${(p.score / maxScore) * 100}%">
                                        <div class="absolute inset-0 shimmer opacity-30"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            container.innerHTML = html;
        }

        // Initialize immediately
        updateLeaderboard();
        
        // Auto-refresh every 5 minutes
        setInterval(updateLeaderboard, 300000);
    </script>
</body>
</html>
