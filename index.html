<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Italy Upsell Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .bar-transition { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-900">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-white rounded-3xl shadow-xl shadow-blue-900/5 border border-slate-200 p-8 mb-8 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="relative z-10 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                    <span class="px-4 py-1 bg-blue-600 text-white text-[10px] font-black rounded-full uppercase tracking-[0.2em]">Live Tracking</span>
                    <span id="update-time" class="text-slate-400 text-xs font-medium italic underline decoration-blue-200 decoration-2 underline-offset-4">Initializing...</span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight leading-none uppercase">AM Italy Upsell<br><span class="text-blue-600 italic normal-case">Leaderboard</span></h1>
            </div>
            <div id="stats" class="relative z-10"></div>
        </header>

        <div id="main-content">
            <div class="flex flex-col items-center justify-center py-24 text-slate-300 bg-white rounded-3xl border border-slate-100 shadow-sm">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-100 border-b-blue-600 mb-4"></div>
                <p class="font-bold uppercase tracking-widest text-xs animate-pulse text-slate-400">Authenticating with Sheets...</p>
            </div>
        </div>

        <!-- Debug and Source Info -->
        <footer class="mt-12 text-center border-t border-slate-200 pt-8">
            <div class="inline-flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <span>Refreshes every 5 mins</span>
                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR6XFMPsUzIfkiclyMTRuN-SV2ioJEQY2p-dP1FIDsoDe8JA_DHQmOabtJHMr8V_U0BQjs7O3v9uBK5/pub?gid=0&single=true&output=csv" target="_blank" class="hover:text-blue-600 transition-colors underline underline-offset-4">View Source Data</a>
            </div>
        </footer>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6XFMPsUzIfkiclyMTRuN-SV2ioJEQY2p-dP1FIDsoDe8JA_DHQmOabtJHMr8V_U0BQjs7O3v9uBK5/pub?gid=0&single=true&output=csv";

        async function updateLeaderboard() {
            const container = document.getElementById('main-content');
            const timeLabel = document.getElementById('update-time');
            
            try {
                // Using PapaParse's built-in download feature which is more resilient to certain network rules
                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    // Try to avoid caching
                    downloadRequestHeaders: { "Cache-Control": "no-cache" },
                    complete: function(results) {
                        const rows = results.data;
                        const data = rows.map(row => ({
                            name: (row[4] || "").toString().trim(),
                            score: parseInt((row[5] || "").toString().trim().replace(/,/g, ''))
                        }))
                        .filter(item => item.name && item.name !== "" && !isNaN(item.score) && item.name.toLowerCase() !== "name")
                        .sort((a, b) => b.score - a.score);

                        if (data.length === 0) {
                            container.innerHTML = `
                                <div class="p-20 text-center bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400 font-bold uppercase tracking-widest text-xs">
                                    Sync Successful but No Data Found<br>
                                    <span class="text-[10px] font-normal normal-case mt-2 block opacity-60 italic">Please check that Column E & F in the "Recap" tab are populated.</span>
                                </div>`;
                            return;
                        }

                        render(data);
                        timeLabel.innerText = `Last update: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                    },
                    error: function(err) {
                        throw new Error(err);
                    }
                });
            } catch (err) {
                container.innerHTML = `
                <div class="p-12 text-center bg-red-50 text-red-600 rounded-3xl border border-red-100 shadow-sm shadow-red-100">
                    <p class="font-black text-xl mb-2 italic uppercase">Connection Blocked</p>
                    <p class="text-xs opacity-80 uppercase tracking-widest font-bold mb-6">Your office network or VPN is preventing the live sync.</p>
                    <div class="flex flex-col gap-3 max-w-xs mx-auto">
                        <button onclick="location.reload()" class="bg-red-600 text-white text-[10px] font-black py-3 rounded-xl uppercase tracking-widest shadow-lg shadow-red-600/30">Retry Connection</button>
                        <p class="text-[9px] text-slate-400 normal-case leading-relaxed">If this persists, open this link on your phone (off-VPN) to view the live board.</p>
                    </div>
                </div>`;
            }
        }

        function render(data) {
            const container = document.getElementById('main-content');
            const statsContainer = document.getElementById('stats');
            const maxScore = Math.max(...data.map(d => d.score), 1);
            
            statsContainer.innerHTML = `
                <div class="bg-slate-900 text-white px-8 py-4 rounded-3xl shadow-2xl shadow-blue-900/20 flex flex-col items-center md:items-end">
                    <span class="text-[9px] font-black uppercase opacity-50 block mb-1 tracking-widest">Competition High</span>
                    <span class="text-4xl font-black italic tracking-tighter">${maxScore} <span class="text-xs font-bold not-italic opacity-40">PTS</span></span>
                </div>`;

            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    ${data.slice(0, 3).map((p, i) => `
                        <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-xl relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <span class="text-5xl font-black italic text-slate-100 group-hover:text-blue-50 transition-colors">0${i+1}</span>
                                <div class="w-12 h-12 flex items-center justify-center rounded-2xl ${i === 0 ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'bg-slate-50 border border-slate-100 text-2xl'}">
                                    ${i === 0 ? '👑' : i === 1 ? '🥈' : '🥉'}
                                </div>
                            </div>
                            <h3 class="font-black text-xl uppercase tracking-tight text-slate-800 leading-tight mb-2">${p.name}</h3>
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black text-blue-600">${p.score}</span>
                                <span class="text-[9px] font-black uppercase text-slate-300 tracking-widest">Points Total</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="bg-white rounded-[2rem] shadow-xl shadow-blue-900/5 border border-slate-200 p-8 space-y-8">
                    ${data.map((p, i) => `
                        <div class="flex items-center gap-6 group">
                            <div class="w-10 text-center font-black text-slate-200 italic text-2xl group-hover:text-blue-600 transition-colors">#${i + 1}</div>
                            <div class="flex-1">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="font-extrabold text-slate-800 tracking-tight group-hover:translate-x-1 transition-transform uppercase text-sm">${p.name}</span>
                                    <span class="text-xs font-black text-slate-900">${p.score} <span class="opacity-20">PTS</span></span>
                                </div>
                                <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden relative">
                                    <div class="h-full rounded-full bar-transition relative ${i < 3 ? 'bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.3)]' : 'bg-slate-300'}" 
                                         style="width: ${(p.score / maxScore) * 100}%">
                                        <div class="absolute inset-0 shimmer opacity-30"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            container.innerHTML = html;
        }

        updateLeaderboard();
        setInterval(updateLeaderboard, 300000);
    </script>
</body>
</html>
